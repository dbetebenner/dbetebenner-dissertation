    thesis:
      workingTitle: "IRTc: Copula-Based Item Response Theory"
      workingSubtitle: ""
      researchQuestion: >-
        Can a copula-first formulation of Item Response Theory (IRTc) recover conventional
        local-independence IRT as the independence-copula special case — and on which real
        item-response datasets does separating item-response marginals from dependence structures
        improve held-out prediction, model fit, and diagnostic interpretability relative to
        Rasch/2PL/3PL/GRM/MIRT baselines?
      background: >-
        Conventional IRT treats local independence as the default assumption: conditional on
        ability, item responses factorize into a product of item-level probabilities. The founding
        conjecture of this project — treated strictly as a hypothesis, not evidence — is that if
        Lord-era IRT had had access to Sklar's theorem, copula theory, and modern compute, parts of
        IRT might have developed as a dependence-modeling framework in which local independence is
        simply the independence-copula case rather than the default. I come to this question after
        decades of work in educational measurement (student growth percentiles, large-scale
        assessment), where local dependence, testlets, and multidimensionality are persistent
        practical realities that conventional models treat as nuisances. This dissertation is also
        deliberately a second experiment: it is developed inside dataimago, an AI-native research
        framework, to test whether an auto-research machine — citation-audited literature work,
        frozen evaluation rules, agent-run experiment loops — can carry a genuine methodological
        research program from conjecture to falsifiable, reproducible findings.
      contribution: >-
        Three intended contributions. (1) Theory: a formally specified IRTc model family that
        separates item-response marginals from dependence structures, states identifiability
        assumptions for discrete (dichotomous/ordinal) responses explicitly, and characterizes
        exactly which conventional IRT models are special cases, approximations, or mere analogies
        of copula constructions. (2) Empirics: fair, reproducible benchmarks of IRTc against
        conventional baselines on simulated data and Item Response Warehouse (IRW) datasets —
        held-out prediction, limited-information fit, residual-dependence diagnostics, parameter
        stability, and sensitivity analyses — with failure cases documented as first-class results.
        (3) Infrastructure: a reproducible research web application (the dataimago research machine)
        in which every material claim is citation-backed via a claim ledger, every experiment is
        registered before it runs, and auto-research loops operate only on declared editable
        surfaces under frozen evaluation rules.
