name: Generate (dataimago::ai)
#
# Re-generates the producer-driver integration artifacts (public/api/*.json
# incl. discover.json + mcp-schema.json, packages/shared-utils/src/types.ts,
# optional R/api.R) from the current `dataimago-spec.yaml` + R package source.
#
# Triggers on pushes that change the spec or the R package (and manually).
# Enabled in D.2.3.b, once `dataimago::ai(spec_path)` shipped in the
# `dataimago/dataimago` R package. The bot's commit carries `[skip ci]` so its
# own push doesn't retrigger this workflow.
#
on:
  push:
    branches: [main]
    paths:
      - 'dataimago-spec.yaml'
      - 'packages/r-packages/**/R/**'
      - 'packages/r-packages/**/DESCRIPTION'
  workflow_dispatch: {}

jobs:
  # When dissertation.ai provisions a repo, `createRepoFromTemplate` lands an
  # initial commit of the RAW template — `dataimago-spec.yaml` still holds
  # `{{…}}` / `PLACEHOLDER-…` tokens — before the hub commits the substituted
  # spec. That raw commit touches `dataimago-spec.yaml`, so without this guard it
  # triggers `generate` against a placeholder spec and fails
  # ("Could not find the R package at …/PLACEHOLDER-thesis-rpkg"), leaving a
  # confusing red ✗ in the brand-new repo even though the real (substituted) run
  # right after it is green. The guard skips the heavy job until the spec is real.
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if grep -qE 'PLACEHOLDER-|\{\{' dataimago-spec.yaml; then
            echo "dataimago-spec.yaml is still an unsubstituted template (raw provisioning state); skipping generate until dissertation.ai commits the real spec."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  generate:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # `dataimago` is not on CRAN — install from the GitHub repo. The R
          # package is at the repo ROOT, so NO subdir (pak ref: github::owner/repo).
          # The stale `github::dataimago/dataimago/dataimago` (subdir) ref failed
          # the first real E2E run ("Can't find R package ... in directory 'dataimago'").
          packages: |
            github::dataimago/dataimago
            any::yaml
            any::jsonlite

      - name: Run dataimago::ai(spec_path)
        run: |
          Rscript -e 'dataimago::ai(spec_path = "dataimago-spec.yaml")'

      - name: Commit + push generated changes
        run: |
          git config user.name "dataimago-bot"
          git config user.email "bot@dataimago.ai"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore(generate): refresh from dataimago::ai() [skip ci]"
            git push
          else
            echo "(no changes to commit)"
          fi
