project:
  title: "IRTc: Copula-Based Item Response Theory"
  description: >-
    Conventional IRT treats local independence as the default assumption: conditional on ability,
    item responses factorize into a product of item-level probabilities.  The founding conjecture of
    this project — treated strictly as a hypothesis, not evidence — is that if Lord-era IRT had had
    access to Sklar's theorem, copula theory, and modern compute, parts of IRT might have developed
    as a dependence-modeling framework in which local independence is simply the independence-copula
    case rather than the default.  I come to this question after decades of work in educational
    measurement (student growth percentiles, large-scale assessment), where local dependence,
    testlets, and multidimensionality are persistent practical realities that conventional models
    treat as nuisances.
