      additionalNotes: >-
        Dual-purpose project. (1) This dissertation develops IRTc — a copula-first formulation of
        Item Response Theory — under the research charter in the IRTc Auto-Research Blueprint (to be
        committed at raw/background/IRTc.md in this repo). The founding Lord-era counterfactual is a
        hypothesis and a generator of research questions, never evidence; no claim of IRTc
        superiority is permitted without specified response scale, margin definition,
        identifiability conditions, estimation procedure, and audited empirical support. (2) The
        project is simultaneously the first end-to-end stress test of the dataimago research machine
        itself: citation-backed claim ledger, registered experiments with frozen metrics and
        immutable splits, auto-research loops restricted to declared editable surfaces, and
        reproducible Quarto reporting. Findings about the framework feed back into dataimago;
        findings about IRTc feed the dissertation. Milestones M0–M5 from the blueprint execute
        inside this generated repository.
