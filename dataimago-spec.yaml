        - id: diagnostics-sensitivity-limitations
          title: Diagnostics, Sensitivity Analyses, and Limitations
      methodology:
        approach: computational
        summary: >-
          A laddered computational program. Level 0: reproducible conventional baselines (Rasch/1PL,
          2PL, 3PL, GRM, GPCM, MIRT/bi-factor) via mirt and TAM. Level 1: an IRTc product-copula
          wrapper that must match baselines within numerical tolerance. Level 2: one-factor copula
          models (Gaussian, t, Frank, Clayton/Gumbel and rotations) via FactorCopula, with
          simulation-based parameter recovery. Levels 3–4: local-dependence and structured
          multidimensional copula models (testlet copulas, vines, bi-factor/second-order
          constructions). Evaluation uses held-out log loss and Brier score, limited-information fit
          (M2), Q3-style residual dependence, calibration by ability strata, parameter-recovery
          RMSE, and compute cost — under pre-registered experiment manifests with frozen metrics,
          immutable splits, and claim audits before any superiority statement.
